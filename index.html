<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting Digital</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat Version untuk kemudahan penggunaan di single HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Firebase Config dari Environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'evoting-app-prod';

        // Initialize Firebase menggunakan versi Compat agar tidak bentrok dengan modul Babel
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Icon Component Wrapper
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [role, setRole] = useState('guest');
            const [view, setView] = useState('login');
            const [candidates, setCandidates] = useState([]);
            const [voters, setVoters] = useState([]);
            const [settings, setSettings] = useState({ startTime: '', endTime: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [lastUpdate, setLastUpdate] = useState(new Date());

            // Modals
            const [showCandModal, setShowCandModal] = useState(false);
            const [showVoterModal, setShowVoterModal] = useState(false);
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [candForm, setCandForm] = useState({ nama: '', foto: '' });
            const [voterForm, setVoterForm] = useState({ username: '', password: '' });
            const [tempSettings, setTempSettings] = useState({ startTime: '', endTime: '' });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth Error:", e);
                    }
                };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(setUser);
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Path sesuai aturan: /artifacts/{appId}/public/data/{collectionName}
                const candRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('candidates');
                const voterRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters');
                const configRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('votingTime');

                const unsubCand = candRef.onSnapshot(s => {
                    setCandidates(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLastUpdate(new Date());
                }, err => console.error("Firestore Error Candidates:", err));

                const unsubVoter = voterRef.onSnapshot(s => {
                    setVoters(s.docs.map(d => ({ id: d.id, ...d.data() })));
                }, err => console.error("Firestore Error Voters:", err));

                const unsubSettings = configRef.onSnapshot(doc => {
                    if (doc.exists) {
                        setSettings(doc.data());
                        setTempSettings(doc.data());
                    }
                }, err => console.error("Firestore Error Settings:", err));

                return () => { unsubCand(); unsubVoter(); unsubSettings(); };
            }, [user]);

            const votingStatus = useMemo(() => {
                if (!settings.startTime || !settings.endTime) return 'ready';
                const now = new Date().getTime();
                const start = new Date(settings.startTime).getTime();
                const end = new Date(settings.endTime).getTime();
                if (now < start) return 'not_started';
                if (now > end) return 'ended';
                return 'ongoing';
            }, [settings]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                if (loginForm.username === 'admin' && loginForm.password === 'admin123') {
                    setRole('admin');
                    setView('admin');
                } else {
                    const vDoc = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters').doc(loginForm.username).get();
                    if (vDoc.exists && vDoc.data().password === loginForm.password) {
                        setRole('user');
                        setView(vDoc.data().hasVoted ? 'result' : 'vote');
                    } else {
                        setError('Username atau password salah');
                    }
                }
                setLoading(false);
            };

            const submitVote = async (id) => {
                if (votingStatus !== 'ongoing') {
                    alert("Pemilihan tidak aktif saat ini.");
                    return;
                }
                setLoading(true);
                try {
                    const voterRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters').doc(loginForm.username);
                    const candRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('candidates').doc(id);
                    
                    await voterRef.update({ hasVoted: true });
                    await candRef.update({ votes: firebase.firestore.FieldValue.increment(1) });
                    setView('result');
                } catch (err) {
                    console.error(err);
                    alert("Gagal mengirim suara.");
                }
                setLoading(false);
            };

            const handlePrint = () => {
                const total = candidates.reduce((acc, curr) => acc + (curr.votes || 0), 0);
                const printWindow = window.open('', '_blank');
                const content = `
                    <html>
                        <head><title>Hasil E-Voting</title><style>body{font-family:sans-serif;padding:40px;} table{width:100%;border-collapse:collapse;margin-top:20px;} th,td{border:1px solid #ddd;padding:12px;text-align:left;} .header{text-align:center;border-bottom:2px solid #333;padding-bottom:10px;}</style></head>
                        <body>
                            <div class="header"><h1>LAPORAN HASIL PEMILIHAN DIGITAL</h1><p>Dicetak: ${new Date().toLocaleString('id-ID')}</p></div>
                            <p><strong>Total Partisipasi:</strong> ${total}</p>
                            <table><thead><tr><th>No</th><th>Kandidat</th><th>Suara</th><th>%</th></tr></thead>
                            <tbody>${candidates.sort((a,b) => (b.votes || 0) - (a.votes || 0)).map((c, i) => `<tr><td>${i+1}</td><td>${c.nama}</td><td>${c.votes || 0}</td><td>${total > 0 ? ((c.votes/total)*100).toFixed(1) : 0}%</td></tr>`).join('')}</tbody>
                            </table>
                        </body>
                    </html>`;
                printWindow.document.write(content);
                printWindow.document.close();
                printWindow.print();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.size <= 500000) {
                    const reader = new FileReader();
                    reader.onloadend = () => setCandForm({...candForm, foto: reader.result});
                    reader.readAsDataURL(file);
                } else { alert("File terlalu besar (Maks 500KB)"); }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-800">
                    <header className="bg-white border-b px-6 py-4 sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="font-extrabold text-xl flex items-center gap-2 text-blue-600 uppercase tracking-tighter">
                                <Icon name="vote" size={24} /> E-VOTING
                            </h1>
                            {role !== 'guest' && (
                                <div className="flex items-center gap-3">
                                    {role === 'admin' && <button onClick={() => setView(view === 'admin' ? 'result' : 'admin')} className="text-xs font-bold border px-3 py-1.5 rounded-lg hover:bg-slate-50">{view === 'admin' ? 'Lihat Hasil' : 'Dashboard'}</button>}
                                    <button onClick={() => window.location.reload()} className="text-slate-400 hover:text-red-500 transition-colors"><Icon name="log-out" size={18} /></button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4 md:p-8">
                        {role !== 'guest' && settings.startTime && (
                            <div className="mb-6 bg-white border rounded-2xl p-4 flex flex-wrap gap-4 items-center justify-center shadow-sm">
                                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                                    <Icon name="clock" size={14} className="text-blue-500" /> Mulai: {new Date(settings.startTime).toLocaleString('id-ID')}
                                </div>
                                <div className="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase border-l pl-4">
                                    <Icon name="clock" size={14} className="text-red-500" /> Selesai: {new Date(settings.endTime).toLocaleString('id-ID')}
                                </div>
                                <div className={`ml-auto px-3 py-1 rounded-full text-[10px] font-black tracking-widest ${votingStatus === 'ongoing' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                    {votingStatus === 'ongoing' ? 'LIVE' : 'CLOSED'}
                                </div>
                            </div>
                        )}

                        {view === 'login' && (
                            <div className="max-w-sm mx-auto mt-12 animate-in">
                                <div className="bg-white p-8 rounded-3xl border shadow-xl shadow-slate-200/50">
                                    <h2 className="text-2xl font-black mb-2 text-center">Selamat Datang</h2>
                                    <p className="text-slate-400 text-center text-sm mb-8">Silakan masuk menggunakan akun Anda</p>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <input required placeholder="Username" className="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all" value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} />
                                        <input required type="password" placeholder="Password" className="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} />
                                        {error && <p className="text-red-500 text-xs font-bold text-center">{error}</p>}
                                        <button className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">MASUK SISTEM</button>
                                    </form>
                                    <p className="mt-6 text-[10px] text-center text-slate-300 font-bold uppercase tracking-widest">Digital Voting v1.0</p>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-8 animate-in">
                                <div className="flex justify-between items-end">
                                    <div>
                                        <h2 className="text-2xl font-black italic">PANEL KONTROL</h2>
                                        <p className="text-slate-400 text-sm font-medium">Manajemen data pemilihan digital</p>
                                    </div>
                                    <button onClick={() => setShowSettingsModal(true)} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-black">
                                        <Icon name="calendar" size={14}/> Atur Waktu
                                    </button>
                                </div>

                                <div className="grid md:grid-cols-2 gap-6">
                                    <div className="bg-white border rounded-3xl p-6 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black text-lg">KANDIDAT</h3>
                                            <button onClick={() => setShowCandModal(true)} className="w-8 h-8 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-100"><Icon name="plus" size={18}/></button>
                                        </div>
                                        <div className="space-y-3">
                                            {candidates.map(c => (
                                                <div key={c.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-2xl">
                                                    <div className="flex items-center gap-3">
                                                        <img src={c.foto || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded-xl object-cover border bg-white" />
                                                        <span className="font-bold text-sm">{c.nama}</span>
                                                    </div>
                                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('candidates').doc(c.id).delete()} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            ))}
                                            {candidates.length === 0 && <p className="text-center text-xs text-slate-300 py-4">Belum ada kandidat</p>}
                                        </div>
                                    </div>

                                    <div className="bg-white border rounded-3xl p-6 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-black text-lg">PEMILIH</h3>
                                            <button onClick={() => setShowVoterModal(true)} className="w-8 h-8 bg-slate-50 text-slate-600 rounded-full flex items-center justify-center hover:bg-slate-100"><Icon name="plus" size={18}/></button>
                                        </div>
                                        <div className="space-y-3 max-h-[300px] overflow-y-auto pr-2">
                                            {voters.map(v => (
                                                <div key={v.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-2xl">
                                                    <div>
                                                        <p className="font-bold text-sm">{v.username}</p>
                                                        <p className={`text-[9px] font-black uppercase ${v.hasVoted ? 'text-green-500' : 'text-slate-300'}`}>{v.hasVoted ? 'SUDAH MEMILIH' : 'BELUM'}</p>
                                                    </div>
                                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters').doc(v.id).delete()} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            ))}
                                            {voters.length === 0 && <p className="text-center text-xs text-slate-300 py-4">Belum ada pemilih</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'vote' && (
                            <div className="text-center animate-in">
                                <h2 className="text-3xl font-black mb-8">Pilih Favoritmu, {loginForm.username}!</h2>
                                {votingStatus === 'ongoing' ? (
                                    <div className="grid sm:grid-cols-2 gap-8 max-w-2xl mx-auto">
                                        {candidates.map(c => (
                                            <div key={c.id} className="bg-white border-2 border-transparent p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 hover:border-blue-500 transition-all group">
                                                <img src={c.foto} className="w-40 h-40 rounded-3xl object-cover mx-auto mb-6 shadow-lg group-hover:scale-105 transition-transform" />
                                                <h3 className="text-xl font-black mb-6">{c.nama}</h3>
                                                <button onClick={() => submitVote(c.id)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-blue-600 transition-colors">PILIH SEKARANG</button>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="bg-amber-50 border border-amber-200 p-12 rounded-[2.5rem] text-amber-700">
                                        <Icon name="clock" size={48} className="mx-auto mb-4 opacity-50" />
                                        <p className="font-black text-xl">SESI TIDAK AKTIF</p>
                                        <p className="text-sm mt-2 opacity-80">Pemilihan belum dimulai atau sudah berakhir.</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="max-w-xl mx-auto animate-in">
                                <div className="text-center mb-12">
                                    <div className="w-16 h-16 bg-blue-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                                        <Icon name="bar-chart-3" size={32} />
                                    </div>
                                    <h2 className="text-3xl font-black">Hasil Real-time</h2>
                                    <p className="text-slate-400 text-sm mt-2 flex items-center justify-center gap-2">
                                        <Icon name="refresh-cw" size={12} className="animate-spin text-blue-500"/> Update: {lastUpdate.toLocaleTimeString()}
                                    </p>
                                </div>
                                <div className="space-y-4">
                                    {candidates.sort((a,b) => (b.votes || 0) - (a.votes || 0)).map((c, idx) => {
                                        const total = candidates.reduce((acc, curr) => acc + (curr.votes || 0), 0);
                                        const pct = total > 0 ? ((c.votes || 0) / total * 100).toFixed(1) : 0;
                                        return (
                                            <div key={c.id} className="bg-white p-6 rounded-3xl border shadow-sm">
                                                <div className="flex justify-between items-center mb-4">
                                                    <span className="font-black text-lg">{idx + 1}. {c.nama}</span>
                                                    <span className="font-black text-blue-600">{pct}%</span>
                                                </div>
                                                <div className="h-4 bg-slate-100 rounded-full overflow-hidden border">
                                                    <div className="h-full bg-blue-600 transition-all duration-1000" style={{ width: `${pct}%` }} />
                                                </div>
                                                <p className="mt-3 text-[10px] font-black text-slate-400 uppercase tracking-widest">{c.votes || 0} SUARA</p>
                                            </div>
                                        );
                                    })}
                                </div>
                                {role === 'admin' && (
                                    <button onClick={handlePrint} className="w-full mt-12 py-5 border-4 border-dashed rounded-3xl text-slate-300 font-black hover:text-blue-500 hover:border-blue-500 transition-all flex items-center justify-center gap-3">
                                        <Icon name="printer" size={24}/> CETAK LAPORAN RESMI
                                    </button>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Modals */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
                                <h3 className="font-black text-xl mb-6">JADWAL PEMILIHAN</h3>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase">Mulai</label>
                                        <input type="datetime-local" className="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500" value={tempSettings.startTime} onChange={e => setTempSettings({...tempSettings, startTime: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase">Selesai</label>
                                        <input type="datetime-local" className="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500" value={tempSettings.endTime} onChange={e => setTempSettings({...tempSettings, endTime: e.target.value})} />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setShowSettingsModal(false)} className="flex-1 font-bold text-slate-400 py-3">BATAL</button>
                                    <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('votingTime').set(tempSettings); setShowSettingsModal(false); }} className="flex-1 bg-blue-600 text-white font-black rounded-xl py-3">SIMPAN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCandModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
                                <h3 className="font-black text-xl mb-6 text-center">TAMBAH KANDIDAT</h3>
                                <div className="space-y-4">
                                    <input placeholder="Nama Kandidat" className="w-full border-2 p-4 rounded-xl outline-none focus:border-blue-500" value={candForm.nama} onChange={e => setCandForm({...candForm, nama: e.target.value})} />
                                    <div className="border-2 border-dashed p-6 rounded-2xl text-center relative hover:bg-slate-50 transition-colors">
                                        <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={handleFileUpload} />
                                        {candForm.foto ? <img src={candForm.foto} className="w-20 h-20 mx-auto rounded-xl object-cover shadow-sm" /> : <div className="text-slate-300 font-bold text-[10px] uppercase"><Icon name="plus" size={24} className="mx-auto mb-1 opacity-20"/>Unggah Foto</div>}
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setShowCandModal(false)} className="flex-1 font-bold text-slate-400 py-3">BATAL</button>
                                    <button onClick={async () => { if(!candForm.nama) return; await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('candidates').add({...candForm, votes: 0}); setShowCandModal(false); setCandForm({nama:'', foto:''}); }} className="flex-1 bg-blue-600 text-white font-black rounded-xl py-3 shadow-lg shadow-blue-100">SIMPAN</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showVoterModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
                                <h3 className="font-black text-xl mb-6 text-center">REGISTRASI PEMILIH</h3>
                                <div className="space-y-4">
                                    <input placeholder="Username Pemilih" className="w-full border-2 p-4 rounded-xl outline-none focus:border-blue-500" value={voterForm.username} onChange={e => setVoterForm({...voterForm, username: e.target.value})} />
                                    <input placeholder="Password" type="text" className="w-full border-2 p-4 rounded-xl outline-none focus:border-blue-500" value={voterForm.password} onChange={e => setVoterForm({...voterForm, password: e.target.value})} />
                                </div>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setShowVoterModal(false)} className="flex-1 font-bold text-slate-400 py-3">BATAL</button>
                                    <button onClick={async () => { if(!voterForm.username) return; await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters').doc(voterForm.username).set({...voterForm, hasVoted: false}); setShowVoterModal(false); setVoterForm({username:'', password:''}); }} className="flex-1 bg-slate-900 text-white font-black rounded-xl py-3">DAFTARKAN</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
