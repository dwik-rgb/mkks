<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting Digital</title>
    <!-- Tailwind CSS - Load First -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Optimized Fade In */
        .fade-in { animation: opac 0.3s ease-in; }
        @keyframes opac { from { opacity: 0; } to { opacity: 1; } }
        /* Skeleton loading style */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <!-- Initial Static HTML for instant visual feedback -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-slate-300 font-bold animate-pulse">Memuat...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        
        // 1. Instant Firebase Initialization
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'evoting-app-prod';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Optimized Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [role, setRole] = useState('guest');
            const [view, setView] = useState('login');
            const [candidates, setCandidates] = useState([]);
            const [voters, setVoters] = useState([]);
            const [settings, setSettings] = useState({ startTime: '', endTime: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [loginForm, setLoginForm] = useState({ username: '', password: '' });
            const [lastUpdate, setLastUpdate] = useState(new Date());

            // Modals state
            const [modals, setModals] = useState({ cand: false, voter: false, settings: false });
            const [candForm, setCandForm] = useState({ nama: '', foto: '' });
            const [voterForm, setVoterForm] = useState({ username: '', password: '' });

            // Initialize Auth Fast
            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setIsAuthReady(true);
                    if (!u) {
                        // Silent background login to avoid blocking UI
                        const performAuth = async () => {
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await auth.signInWithCustomToken(__initial_auth_token);
                                } else {
                                    await auth.signInAnonymously();
                                }
                            } catch (e) { console.error("Silent Auth Failed", e); }
                        };
                        performAuth();
                    }
                });
                return () => unsub();
            }, []);

            // Data Fetching (Only if Auth is ready)
            useEffect(() => {
                if (!user) return;
                
                const rootPath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubCand = rootPath.collection('candidates').onSnapshot(s => {
                    setCandidates(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLastUpdate(new Date());
                });

                const unsubVoter = rootPath.collection('voters').onSnapshot(s => {
                    setVoters(s.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubSettings = rootPath.collection('config').doc('votingTime').onSnapshot(doc => {
                    if (doc.exists) setSettings(doc.data());
                });

                return () => { unsubCand(); unsubVoter(); unsubSettings(); };
            }, [user]);

            const votingStatus = useMemo(() => {
                if (!settings.startTime || !settings.endTime) return 'ready';
                const now = Date.now();
                const start = new Date(settings.startTime).getTime();
                const end = new Date(settings.endTime).getTime();
                return now < start ? 'not_started' : (now > end ? 'ended' : 'ongoing');
            }, [settings]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                try {
                    if (loginForm.username === 'admin' && loginForm.password === 'admin123') {
                        setRole('admin');
                        setView('admin');
                    } else {
                        const vDoc = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters').doc(loginForm.username).get();
                        if (vDoc.exists && vDoc.data().password === loginForm.password) {
                            setRole('user');
                            setView(vDoc.data().hasVoted ? 'result' : 'vote');
                        } else {
                            setError('Kredensial tidak valid');
                        }
                    }
                } catch (err) { setError('Gagal terhubung ke server'); }
                setLoading(false);
            };

            const submitVote = async (id) => {
                if (votingStatus !== 'ongoing') return alert("Sesi pemilihan tidak aktif.");
                setLoading(true);
                try {
                    const voterRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('voters').doc(loginForm.username);
                    const candRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('candidates').doc(id);
                    await Promise.all([
                        voterRef.update({ hasVoted: true }),
                        candRef.update({ votes: firebase.firestore.FieldValue.increment(1) })
                    ]);
                    setView('result');
                } catch (err) { alert("Gagal mengirim suara."); }
                setLoading(false);
            };

            // Loading state while checking initial auth
            if (!isAuthReady) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen fade-in">
                    <header className="bg-white border-b px-6 py-4 sticky top-0 z-40 shadow-sm">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <h1 className="font-extrabold text-xl flex items-center gap-2 text-blue-600 tracking-tight">
                                <Icon name="vote" size={24} /> E-VOTING
                            </h1>
                            {role !== 'guest' && (
                                <button onClick={() => window.location.reload()} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                    <Icon name="log-out" size={20} />
                                </button>
                            )}
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-6">
                        {view === 'login' && (
                            <div className="max-w-sm mx-auto mt-12">
                                <div className="bg-white p-8 rounded-[2rem] border shadow-2xl shadow-blue-100/50">
                                    <div className="text-center mb-8">
                                        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                            <Icon name="shield-check" size={32} />
                                        </div>
                                        <h2 className="text-2xl font-black text-slate-800">Sistem E-Voting</h2>
                                        <p className="text-slate-400 text-sm mt-1">Silakan masuk untuk memulai</p>
                                    </div>
                                    
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <div>
                                            <input required placeholder="Username" className="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all" value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} />
                                        </div>
                                        <div>
                                            <input required type="password" placeholder="Password" className="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} />
                                        </div>
                                        {error && <div className="bg-red-50 text-red-500 p-3 rounded-xl text-xs font-bold text-center border border-red-100">{error}</div>}
                                        <button disabled={loading} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all disabled:opacity-50">
                                            {loading ? 'MEMPROSES...' : 'LOG IN'}
                                        </button>
                                    </form>
                                    <p className="mt-8 text-[10px] text-center text-slate-300 font-bold uppercase tracking-widest">Digital Authentication Secured</p>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-white p-6 rounded-3xl border shadow-sm">
                                    <div>
                                        <h2 className="text-xl font-black">ADMIN DASHBOARD</h2>
                                        <p className="text-slate-400 text-xs">Kelola kandidat dan pantau suara</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setView('result')} className="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-xs font-bold">Hasil Suara</button>
                                        <button onClick={() => setModals({...modals, settings: true})} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Atur Sesi</button>
                                    </div>
                                </div>
                                <div className="grid md:grid-cols-2 gap-6">
                                    {/* Candidate Card */}
                                    <div className="bg-white border rounded-3xl p-6 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold">Kandidat ({candidates.length})</h3>
                                            <button onClick={() => setModals({...modals, cand: true})} className="text-blue-600 font-bold text-xs">+ Tambah</button>
                                        </div>
                                        <div className="space-y-3">
                                            {candidates.map(c => (
                                                <div key={c.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <div className="flex items-center gap-3">
                                                        <img src={c.foto || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded-xl object-cover" />
                                                        <span className="font-bold text-sm">{c.nama}</span>
                                                    </div>
                                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('candidates').doc(c.id).delete()} className="text-red-400 hover:bg-red-50 p-1 rounded-lg transition-colors"><Icon name="trash-2" size={16}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    {/* Voter Card */}
                                    <div className="bg-white border rounded-3xl p-6 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold">Pemilih ({voters.length})</h3>
                                            <button onClick={() => setModals({...modals, voter: true})} className="text-blue-600 font-bold text-xs">+ Tambah</button>
                                        </div>
                                        <div className="space-y-3 max-h-[250px] overflow-y-auto">
                                            {voters.map(v => (
                                                <div key={v.id} className="flex items-center justify-between p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                                    <span className="text-sm font-medium">{v.username}</span>
                                                    <span className={`text-[9px] px-2 py-1 rounded-full font-bold ${v.hasVoted ? 'bg-green-100 text-green-600' : 'bg-slate-200 text-slate-500'}`}>{v.hasVoted ? 'SUDAH' : 'BELUM'}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'vote' && (
                            <div className="animate-in">
                                <h2 className="text-2xl font-black text-center mb-8">Halo, {loginForm.username}! Pilih Suaramu:</h2>
                                <div className="grid sm:grid-cols-2 gap-6 max-w-2xl mx-auto">
                                    {candidates.map(c => (
                                        <div key={c.id} className="bg-white p-6 rounded-[2rem] border-2 border-transparent hover:border-blue-500 shadow-xl transition-all text-center">
                                            <img src={c.foto} className="w-32 h-32 rounded-3xl object-cover mx-auto mb-4 shadow-md" />
                                            <h3 className="text-lg font-bold mb-4">{c.nama}</h3>
                                            <button onClick={() => submitVote(c.id)} className="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 transition-colors">PILIH</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'result' && (
                            <div className="max-w-md mx-auto">
                                <h2 className="text-2xl font-black text-center mb-8">Hasil Perhitungan Suara</h2>
                                <div className="space-y-4">
                                    {candidates.sort((a,b) => (b.votes || 0) - (a.votes || 0)).map((c, idx) => {
                                        const total = candidates.reduce((acc, curr) => acc + (curr.votes || 0), 0);
                                        const pct = total > 0 ? ((c.votes || 0) / total * 100).toFixed(1) : 0;
                                        return (
                                            <div key={c.id} className="bg-white p-6 rounded-2xl border shadow-sm">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="font-bold">{c.nama}</span>
                                                    <span className="text-blue-600 font-bold">{pct}%</span>
                                                </div>
                                                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="h-full bg-blue-600 transition-all duration-1000" style={{ width: `${pct}%` }}></div>
                                                </div>
                                                <p className="text-[10px] mt-2 text-slate-400">{c.votes || 0} Suara Terkumpul</p>
                                            </div>
                                        );
                                    })}
                                </div>
                                {role === 'admin' && (
                                    <button onClick={() => setView('admin')} className="w-full mt-8 py-3 text-slate-400 font-bold border-2 border-dashed rounded-xl hover:text-slate-600">Kembali ke Dashboard</button>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Quick Modals */}
                    {modals.settings && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xs rounded-3xl p-6">
                                <h3 className="font-bold mb-4">Atur Waktu Pemilihan</h3>
                                <input type="datetime-local" className="w-full border p-3 rounded-xl mb-3" onChange={e => setSettings({...settings, startTime: e.target.value})} />
                                <input type="datetime-local" className="w-full border p-3 rounded-xl mb-4" onChange={e => setSettings({...settings, endTime: e.target.value})} />
                                <div className="flex gap-2">
                                    <button onClick={() => setModals({...modals, settings: false})} className="flex-1 py-2 text-slate-400 font-bold">Batal</button>
                                    <button onClick={async () => { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('votingTime').set(settings); setModals({...modals, settings: false}); }} className="flex-1 py-2 bg-blue-600 text-white rounded-xl font-bold">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
